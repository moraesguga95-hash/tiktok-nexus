<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKTOK NEXUS | Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10001; display: grid; gap: 10px;"></div>
    
    <section id="landingPage">
        <div style="padding: 80px 20px; text-align: center;">
            <div class="logo" style="font-size: 1.5rem; margin-bottom: 30px;"><i data-lucide="zap"></i> TIKTOK NEXUS</div>
            <h1 class="hero-title" style="font-size: 3rem; margin-bottom: 20px;">Monetize Perfis. <br><span style="color: #00f2ea;">Escale sua Audiência.</span></h1>
            <p style="margin-bottom: 40px; color: #b4b4c0;">O marketplace definitivo para compra e venda de contas.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-primary" onclick="window.toggleAuthModal()">Começar Agora</button>
                <button class="btn btn-outline">Saiba Mais</button>
            </div>
        </div>
    </section>

    <div class="app-shell" id="appShell" style="display: none;">
        <aside class="sidebar">
            <div class="logo"><i data-lucide="zap"></i> NEXUS</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" onclick="window.showSection('homeSection')"><i data-lucide="shopping-cart"></i> Mercado</a>
                <a href="#" class="nav-item" onclick="window.showSection('myStatsSection')"><i data-lucide="user"></i> Minha Conta</a>
                <a href="#" class="nav-item" onclick="window.handleLogout()"><i data-lucide="log-out"></i> Sair</a>
            </nav>
        </aside>
        <main class="main-content">
            <div id="homeSection">
                <h1>Mercado <span style="color: #00f2ea;">Ativo.</span></h1>
                <div class="account-grid" id="accountGrid"></div>
            </div>
        </main>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>Acesse a Plataforma</h2>
            <form id="authForm" style="display: grid; gap: 15px; margin-top: 20px;">
                <input type="email" id="authEmail" placeholder="Seu e-mail" required style="padding: 12px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #333;">
                <input type="password" id="authPassword" placeholder="Sua senha" required style="padding: 12px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #333;">
                <button type="submit" class="btn btn-primary">Entrar</button>
                <p id="toggleAuth" style="font-size: 0.8rem; text-align: center; cursor: pointer;">Ainda não tem conta? Clique aqui.</p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
